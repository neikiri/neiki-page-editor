}

html,
body {
  margin: 0;
  width: 100%;
  min-height: 100%;
}

body {

  background: #f4f7fb;

.topbar {

}

}

}

.features h3 {

  font-size: 13px;
  line-height: 1.55;
}

@media (max-width: 900px) {
  .topbar {
    grid-template-columns: 1fr auto;
  }

  nav {
    display: none;
  }

  .hero {
    grid-template-columns: 1fr;
  }

  .visual {
    max-width: none;
    justify-self: stretch;
  }

}

@media (max-width: 650px) {

  }

  }
